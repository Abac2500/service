services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - postgres
            - redis
        networks:
            - service
    
    nginx:
        image: nginx:1.27-alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - service
    
    postgres:
        image: postgres:18-alpine
        environment:
            POSTGRES_DB: ${DB_DATABASE:-service}
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-service}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - service
    
    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"
        volumes:
            - redisdata:/data
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - service

volumes:
    pgdata:
    redisdata:

networks:
    service:
        driver: bridge
